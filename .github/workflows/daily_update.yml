name: Daily News Update

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Run summarizer
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python summarizer.py

      - name: Copy data to docs folder
        run: |
          mkdir -p docs
          cp summarized_news.json docs/summarized_news.json
          echo "=== Articles count ==="
          python -c "import json; d=json.load(open('summarized_news.json')); print(str(d['total']) + ' articles summarized')"

      - name: Commit and push updated news
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git status
          git diff --staged --quiet || git commit -m "Auto-update news $(date +'%Y-%m-%d %H:%M IST')"
          git push
